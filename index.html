<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dilan Berriel | Media Kit</title>
  <link rel="icon" type="image/png" href="logopaginas.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg: #030303;
      --bg-surface: #0a0a0a;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --accent: #d4af37;
      --accent-soft: rgba(212, 175, 55, 0.12);
      --glass-bg: rgba(20, 20, 20, 0.65);
      --glass-border: rgba(255, 255, 255, 0.06);
      --grain-opacity: 0.035;
    }

    :root.light {
      --bg: #f5f4f1;
      --bg-surface: #ffffff;
      --text-primary: #0f0f0f;
      --text-secondary: #555555;
      --accent: #b48c26;
      --accent-soft: rgba(180, 140, 38, 0.1);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(0, 0, 0, 0.08);
      --grain-opacity: 0.015;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      transition: background-color 0.5s ease, color 0.5s ease;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain Texture Overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 50px;
    }

    /* ===== FLOATING ACTIONS ===== */
    .floating-actions {
      position: fixed;
      top: 40px;
      right: 40px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }

    .btn-action {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .btn-action:hover {
      background: var(--accent);
      color: #000;
      transform: scale(1.12);
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.25);
    }

    .btn-action svg {
      width: 20px;
      height: 20px;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 60px;
      position: relative;
      padding: 80px 0;
    }

    .hero-text {
      position: relative;
      z-index: 2;
    }

    .mk-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-soft);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      padding: 8px 22px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 35px;
    }

    .mk-badge-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    .hero-title {
      font-size: 7.5rem;
      font-weight: 900;
      line-height: 0.88;
      text-transform: uppercase;
      letter-spacing: -3px;
      margin-bottom: 10px;
    }

    .hero-title .letter {
      display: inline-block;
      opacity: 0;
      animation: flicker-in 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes flicker-in {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      20% {
        opacity: 0;
      }

      30% {
        opacity: 0.6;
      }

      40% {
        opacity: 0.2;
      }

      50% {
        opacity: 1;
      }

      60% {
        opacity: 0;
      }

      70% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.2;
      }

      100% {
        opacity: 1;
      }
    }

    .hero-title-outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 2px var(--text-primary);
    }

    .hero-role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 30px;
      margin-top: 20px;
    }

    .hero-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      max-width: 480px;
      font-weight: 300;
    }

    /* Asymmetric Image */
    .hero-image-wrapper {
      position: relative;
      height: 88vh;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .hero-image {
      width: 92%;
      height: 92%;
      object-fit: cover;
      border-radius: 200px 20px 200px 20px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.35);
      border: 1px solid var(--glass-border);
      transition: border-radius 0.8s ease;
    }

    .hero-image:hover {
      border-radius: 20px 200px 20px 200px;
    }

    /* Contact Card */
    .contact-card {
      position: absolute;
      bottom: 12%;
      left: -60px;
      z-index: 3;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: left center;
    }

    .contact-item:hover {
      transform: scale(1.05);
    }

    .contact-item svg {
      width: 15px;
      height: 15px;
      color: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .hero-socials {
      display: flex;
      gap: 15px;
      margin-top: 35px;
    }

    .social-link {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--accent);
    }

    .social-link:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      transform: scale(1.15);
    }

    .social-link svg {
      width: 14px;
      height: 14px;
    }

    /* Scroll Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .scroll-line {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scroll-pulse 2s ease-in-out infinite;
    }

    @keyframes scroll-pulse {

      0%,
      100% {
        opacity: 1;
        height: 50px;
      }

      50% {
        opacity: 0.3;
        height: 30px;
      }
    }

    /* ===== SECTIONS ===== */
    .section {
      padding: 120px 0;
      position: relative;
    }

    .section-header {
      margin-bottom: 60px;
    }

    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 15px;
    }

    .section-title {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    /* ===== STATS ===== */
    .stats-wrapper {
      margin-top: -70px;
      position: relative;
      z-index: 10;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
    }

    .stat-box {
      text-align: center;
      padding: 45px 20px;
      transition: all 0.4s ease;
      border-right: 1px solid var(--glass-border);
      position: relative;
    }

    .stat-box:last-child {
      border-right: none;
    }

    .stat-box:hover {
      background: var(--accent-soft);
    }

    .stat-platform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stat-platform svg {
      width: 16px;
      height: 16px;
    }

    .stat-number {
      font-size: 3.5rem;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 8px;
      line-height: 1;
      background: linear-gradient(180deg, #ffeaa7 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 8px 16px rgba(212, 175, 55, 0.25));
    }

    :root.light .stat-number {
      background: linear-gradient(180deg, var(--accent) 0%, #8a6a1c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: none;
    }

    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ===== BRANDS ===== */
    .brands-strip {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
      padding: 60px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .brand-item {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.4s ease;
      opacity: 0.5;
      cursor: default;
    }

    .brand-item:hover {
      opacity: 1;
      color: var(--accent);
      transform: scale(1.05);
    }

    /* ===== SPLIT SECTION ===== */
    .split-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    /* ===== MARQUEE (ELEGANT) ===== */
    .marquee-container {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      color: var(--accent);
      padding: 15px 0;
      overflow: hidden;
      white-space: nowrap;
      display: flex;
      align-items: center;
      margin-bottom: 80px;
      margin-top: -80px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .marquee-content {
      display: flex;
      animation: marquee 25s linear infinite;
    }

    .marquee-item {
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* Demographics (Professional) */
    .demo-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .demo-bar-wrap {
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      padding: 30px 40px;
      border-radius: 12px;
      transition: all 0.4s ease;
    }

    .demo-bar-wrap:hover {
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .demo-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .demo-bar-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-primary);
    }

    .demo-bar-percent {
      font-size: 3rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--accent);
      line-height: 0.8;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .demo-bar-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }

    .demo-bar-fill {
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
      border-radius: 4px;
    }

    /* Services (Professional) */
    .services-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .service-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 30px;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: all 0.4s ease;
    }

    .service-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      opacity: 0.7;
      transition: opacity 0.4s ease;
    }

    .service-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .service-name {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      color: var(--text-primary);
      transition: color 0.4s ease;
    }

    .service-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 300;
      max-width: 800px;
    }

    .service-row:hover {
      background: linear-gradient(145deg, var(--glass-bg), rgba(212, 175, 55, 0.05));
      border-color: rgba(212, 175, 55, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .service-row:hover .service-name {
      color: var(--accent);
    }

    .service-row:hover .service-number {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .service-row {
        grid-template-columns: 1fr;
        padding: 30px;
        gap: 15px;
      }

      .service-name {
        font-size: 1.8rem;
      }

      .demo-bar-percent {
        font-size: 2.5rem;
      }
    }

    .service-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .service-name {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .service-desc {
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 1rem;
      font-weight: 300;
    }

    /* ===== CTA ===== */
    .cta-section {
      text-align: center;
      padding: 100px 0;
      position: relative;
    }

    .cta-title {
      font-size: 4.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin-bottom: 25px;
    }

    .cta-desc {
      color: var(--text-secondary);
      font-size: 1.15rem;
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto 45px;
      font-weight: 300;
    }

    .cta-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 45px;
      border-radius: 60px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      border: none;
    }

    .cta-btn-primary {
      background: var(--accent);
      color: #000;
    }

    .cta-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
    }

    .cta-btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 2px solid var(--glass-border);
    }

    .cta-btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
    }

    .cta-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cta-btn-primary:hover svg {
      transform: translateX(6px);
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-grid {
      columns: 3;
      column-gap: 25px;
    }

    .port-item {
      break-inside: avoid;
      margin-bottom: 25px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }

    .port-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .port-item:hover img {
      transform: scale(1.06);
    }

    .port-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.2) 40%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      align-items: flex-end;
      padding: 25px;
    }

    .port-item:hover .port-overlay {
      opacity: 1;
    }

    .port-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(15px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      cursor: zoom-out;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 40px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 2.5rem;
      cursor: pointer;
      transition: transform 0.3s ease;
      line-height: 1;
    }

    .lightbox-close:hover {
      transform: scale(1.15);
      color: var(--accent);
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: 40px 0;
      border-top: 1px solid var(--glass-border);
      display: flex;

      const [count, setCount] = useState(0);
      const [hasStarted, setHasStarted] = useState(false);
      const ref = useRef(null);

      const start = useCallback(() => {
        if (hasStarted) return;
        setHasStarted(true);
        const startTime = performance.now();
        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setCount(eased * end);
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [end, duration, hasStarted]);

      return { count, ref, start, hasStarted };
    };

                  <a href={CONTACT.tiktok} target="_blank" rel="noreferrer" className="social-link" title="TikTok"><Icons.TikTok /></a>
                  <a href={CONTACT.youtube} target="_blank" rel="noreferrer" className="social-link" title="YouTube"><Icons.YouTube /></a>
                  <a href={CONTACT.kick} target="_blank" rel="noreferrer" className="social-link" title="Kick"><Icons.Kick /></a>
                </motion.div>
              </motion.div>

              <motion.div initial={{ opacity: 0, scale: 0.92 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1.2, delay: 0.2 }} className="hero-image-wrapper">
                <img src={CONTACT.mainImage} alt="Dilan Berriel" className="hero-image" />

                <motion.div initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 1 }} className="contact-card">
                  <a href={CONTACT.whatsapp} target="_blank" rel="noreferrer" className="contact-item"><Icons.Phone /> {CONTACT.phone}</a>
                  <a href={`mailto:${CONTACT.mail}`} className="contact-item"><Icons.Mail /> {CONTACT.mail}</a>
                  <div className="contact-item"><Icons.Location /> {CONTACT.location}</div>
                </motion.div>
              </motion.div>


            </section>

            {/* ═══ STATS ═══ */}
            <div className="stats-wrapper">
              <motion.div initial={{ opacity: 0, y: 40 }} whileInView={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} viewport={{ once: true }} className="stats-container">
                {t.stats.map((stat, i) => <StatBox key={i} stat={stat} index={i} />)}
              </motion.div>
            </div>

            {/* ═══ BRANDS ═══ */}
            <motion.div initial={{ opacity: 0 }} whileInView={{ opacity: 1 }} transition={{ duration: 1 }} viewport={{ once: true }}>
              <div className="brands-strip">
                {t.brands.map((brand, i) => (
                  <motion.div key={i} initial={{ opacity: 0, y: 15 }} whileInView={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.1 }} viewport={{ once: true }} className="brand-item">
                    {brand}
                  </motion.div>
                ))}
              </div>
            </motion.div>

            {/* ═══ SERVICES ═══ */}
            <section className="section">
              <div className="marquee-container">
                <div className="marquee-content">
                  <div className="marquee-item">
                    <span>✦ {t.services.label}</span>
                    <span>CREATIVE DIRECTION</span>
                    <span>✦ {t.services.label}</span>
                    <span>CONTENT CREATION</span>
                    <span>✦ {t.services.label}</span>
                    <span>BRANDING</span>
                    <span>✦ {t.services.label}</span>
                    <span>CREATIVE DIRECTION</span>
                    <span>✦ {t.services.label}</span>
                    <span>CONTENT CREATION</span>
                    <span>✦ {t.services.label}</span>
                    <span>BRANDING</span>
                  </div>
                </div>
              </div>

              <motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} viewport={{ once: true }}>
                <div className="section-header" style={{ marginBottom: '50px' }}>
                  <h2 className="section-title">{t.services.title}</h2>
                </div>
                <div className="services-list">
                  {t.services.items.map((srv, i) => (
                    <motion.div key={i} initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.1 }} viewport={{ once: true }} className="service-row">
                      <div className="service-number">0{i + 1}</div>
                      <div className="service-content">
                        <div className="service-name">{srv.name}</div>
                        <div className="service-desc">{srv.desc}</div>
                      </div>
                    </motion.div>
                  ))}
                </div>
              </motion.div>
            </section>

            {/* ═══ DEMOGRAPHICS ═══ */}
            <section className="section">
              <motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} viewport={{ once: true }}>
                <div className="section-header">
                  <h2 className="section-title">{t.demographics.title}</h2>
                </div>
                <div className="demo-container">
                  {t.demographics.items.map((demo, i) => (
                    <BarProgress key={i} percent={demo.percent} label={demo.label} delay={i * 0.15} />
                  ))}
                </div>
              </motion.div>
            </section>

            {/* ═══ PORTFOLIO ═══ */}
            <section className="section" data-html2canvas-ignore={isGenerating ? "true" : undefined}>
              <motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} viewport={{ once: true }}>
                <div className="section-header" style={{ textAlign: 'center' }}>
                  <div className="section-label">{t.portfolio.label}</div>
                  <h2 className="section-title">{t.portfolio.title}</h2>
                </div>

                <div className="portfolio-grid">
                  {CONTACT.portfolio.map((img, i) => (
                    <motion.div key={i} className="port-item" initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.08 }} viewport={{ once: true }} onClick={() => setLightboxImg(img)} style={isGenerating ? { opacity: 1, transform: 'none' } : {}}>
                      <img src={img} alt={t.portfolioLabels[i]} loading="eager" />
                      <div className="port-overlay">
                        <span className="port-label">{t.portfolioLabels[i]}</span>
                      </div>
                    </motion.div>
                  ))}
                </div>
              </motion.div>
            </section>

            {/* ═══ CTA ═══ */}
            <section className="cta-section">
              <motion.div initial={{ opacity: 0, y: 40 }} whileInView={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} viewport={{ once: true }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '20px', marginBottom: '35px' }}>
                  <div style={{ flex: 1, maxWidth: '200px', height: '2px', background: 'var(--glass-border)' }} />
                  <span style={{ color: 'var(--accent)', fontSize: '0.75rem', letterSpacing: '4px', fontFamily: 'Space Grotesk', fontWeight: 600 }}>✦</span>
                  <div style={{ flex: 1, maxWidth: '200px', height: '2px', background: 'var(--glass-border)' }} />
                </div>
                <h2 className="cta-title">{t.cta.title}</h2>
                <p className="cta-desc">{t.cta.desc}</p>
                <div className="cta-buttons">
                  <a href={`mailto:${CONTACT.mail}`} className="cta-btn cta-btn-primary">
                    {t.cta.btnPrimary}
                    <Icons.Arrow />
                  </a>
                  <button className="cta-btn cta-btn-outline" onClick={downloadPDF}>
                    <Icons.Download />
                    {t.cta.btnSecondary}
                  </button>
                </div>
              </motion.div>
            </section>

            {/* ═══ FOOTER ═══ */}
            <footer className="footer">
              <div className="footer-text">&copy; {new Date().getFullYear()} Dilan Berriel. {t.rights}</div>
              
              <div className="creator-watermark">
                <img
                  src="signaturenobackground.png"
                  alt="Created by Alay"
                  className="creator-signature"
                />
                <div className="creator-socials">
                  {/* Instagram */}
                  <a href="https://www.instagram.com/alaybuilds?igsh=ZjM4dWtjaWFrMXly" target="_blank" rel="noreferrer" className="creator-social-link" title="Instagram @alaybuilds">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <defs>
                        <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                          <stop offset="0%" stopColor="#f09433" />
                          <stop offset="25%" stopColor="#e6683c" />
                          <stop offset="50%" stopColor="#dc2743" />
                          <stop offset="75%" stopColor="#cc2366" />
                          <stop offset="100%" stopColor="#bc1888" />
                        </linearGradient>
                      </defs>
                      <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#ig-grad)" strokeWidth="2" />
                      <circle cx="12" cy="12" r="4" stroke="url(#ig-grad)" strokeWidth="2" />
                      <circle cx="17.5" cy="6.5" r="1" fill="url(#ig-grad)" />
                    </svg>
                  </a>
                  {/* TikTok */}
                  <a href="https://www.tiktok.com/@alaydev?_r=1&_t=ZS-954TvKctxc0" target="_blank" rel="noreferrer" className="creator-social-link" title="TikTok @alaydev">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z" fill="var(--text-primary)" />
                    </svg>
                  </a>
                </div>
              </div>
            </footer>

          </div>
        </div>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
